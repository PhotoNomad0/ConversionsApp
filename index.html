<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lat/Lon ⇄ Maidenhead Grid</title>

  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0b1220">

  <style>
    body { font-family: system-ui, -apple-system, sans-serif; margin: 16px; }
    input, button { font-size: 16px; padding: 10px; width: 100%; box-sizing: border-box; }
    .row { display: grid; gap: 10px; margin: 12px 0; }
    .card { padding: 12px; border: 1px solid #ddd; border-radius: 10px; margin: 12px 0; }
    .card summary { cursor: pointer; font-size: 1.5em; font-weight: bold; }
    .muted { color: #555; font-size: 13px; }
    code { background: #f5f5f5; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <h1>Conversions</h1>
  <p class="muted">Works offline once opened at least once and added to Home Screen on iPhone.</p>

  <details class="card">
    <summary>Temperature F⇄C</summary>
    <div class="row">
      <input id="tempF" inputmode="decimal" placeholder="Fahrenheit (e.g. 68)" />
      <button id="toC">Convert to Celsius</button>
      <input id="tempC" inputmode="decimal" placeholder="Celsius (e.g. 20)" />
      <button id="toF">Convert to Fahrenheit</button>
      <div>Result: <code id="tempOut">—</code></div>
    </div>
  </details>

  <details class="card">
    <summary>Feet ⇄ Meters</summary>
    <div class="row">
      <input id="feet" inputmode="decimal" placeholder="Feet (e.g. 6)" />
      <button id="toMeters">Convert to Meters</button>
      <input id="meters" inputmode="decimal" placeholder="Meters (e.g. 1.83)" />
      <button id="toFeet">Convert to Feet</button>
      <div>Result: <code id="lengthOut">—</code></div>
    </div>
  </details>

  <details class="card">
    <summary>Pounds ⇄ Kilograms</summary>
    <div class="row">
      <input id="pounds" inputmode="decimal" placeholder="Pounds (e.g. 150)" />
      <button id="toKg">Convert to Kilograms</button>
      <input id="kg" inputmode="decimal" placeholder="Kilograms (e.g. 68)" />
      <button id="toPounds">Convert to Pounds</button>
      <div>Result: <code id="weightOut">—</code></div>
    </div>
  </details>

  <details class="card">
    <summary>Miles ⇄ Kilometers</summary>
    <div class="row">
      <input id="miles" inputmode="decimal" placeholder="Miles (e.g. 5)" />
      <button id="toKm">Convert to Kilometers</button>
      <input id="km" inputmode="decimal" placeholder="Kilometers (e.g. 8)" />
      <button id="toMiles">Convert to Miles</button>
      <div>Result: <code id="distanceOut">—</code></div>
    </div>
  </details>
  
  <details class="card">
    <summary>Lat/Lon → Grid</summary>
    <div class="row">
      <input id="lat" inputmode="decimal" placeholder="Latitude (e.g. 37.7749)" />
      <input id="lon" inputmode="decimal" placeholder="Longitude (e.g. -122.4194)" />
      <button id="toGrid">Convert to Grid</button>
      <div>Grid: <code id="gridOut">—</code></div>
    </div>
  </details>

  <details class="card">
    <summary>Maidenhead Grid → Lat/Lon (center of square)</summary>
    <div class="row">
      <input id="grid" autocapitalize="characters" placeholder="Grid (e.g. CM87wj)" />
      <button id="toLatLon">Convert to Lat/Lon</button>
      <div>Lat: <code id="latOut">—</code> Lon: <code id="lonOut">—</code></div>
    </div>
  </details>

  <script src="app.js"></script>
</body>
</html>
